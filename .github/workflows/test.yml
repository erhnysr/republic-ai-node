name: Republic AI Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate Scripts
      run: |
        bash -n scripts/auto_compute.sh
        
    - name: Test Monitoring
      run: |
        python3 -m py_compile monitoring/gpu_tracker.py
        
    - name: Validate Docker Compose
      run: |
        docker-compose config
